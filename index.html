<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nextonio</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        background: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #0d0d12 60%);
        color: #f5f5f7;
        text-align: center;
        padding: 2rem;
      }
      .card {
        max-width: 32rem;
      }
      h1 {
        font-size: clamp(2.5rem, 8vw, 4.5rem);
        font-weight: 800;
        letter-spacing: -0.03em;
        background: linear-gradient(135deg, #7f9cf5, #c084fc);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      p {
        margin-top: 1rem;
        font-size: 1.125rem;
        line-height: 1.6;
        color: #a1a1aa;
      }
      .badge {
        display: inline-block;
        margin-top: 2rem;
        padding: 0.5rem 1rem;
        border: 1px solid #27272a;
        border-radius: 9999px;
        font-size: 0.875rem;
        color: #71717a;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Nextonio</h1>
      <p>Your new app is live. This is a starting point &mdash; ready to grow into whatever you build next.</p>
      <span class="badge">Deployed on Vercel</span>
    </main>
  </body>
</html>
